spring:
  application:
    name: Coachly Workouts BE
  mvc:
    log-request-details: true
  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${COACHLY_DB_URL}
    username: ${COACHLY_DB_USERNAME}
    password: ${COACHLY_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: workout
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false

  sql:
    init:
      mode: always

server:
  address: 0.0.0.0
  port: 8080
  compression:
    enabled: true
  http2:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql: WARN
    it.aredegalli: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, beans, metrics, env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    git:
      mode: full
    env:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
